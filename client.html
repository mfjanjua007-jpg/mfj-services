<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI','Noto Nastaliq Urdu',Tahoma,Arial,sans-serif;background:linear-gradient(135deg,#F0F9FF 0%,#EFF6FF 40%,#FDF4FF 100%);min-height:100vh;color:#0F172A;line-height:1.7;}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;background:linear-gradient(135deg,#0F172A 0%,#1E1B4B 35%,#0C1A2E 65%,#0D0B1A 100%);}
.lb{position:absolute;border-radius:50%;pointer-events:none;filter:blur(90px);opacity:.5;}
.lb1{width:500px;height:500px;top:-150px;right:-150px;background:radial-gradient(circle,#0EA5E9,#8B5CF6,transparent 70%);animation:f1 10s ease-in-out infinite;}
.lb2{width:400px;height:400px;bottom:-100px;left:-100px;background:radial-gradient(circle,#10B981,#06B6D4,transparent 70%);animation:f2 12s ease-in-out infinite;}
@keyframes f1{0%,100%{transform:translate(0,0);}50%{transform:translate(30px,-20px);}}
@keyframes f2{0%,100%{transform:translate(0,0);}50%{transform:translate(-25px,20px);}}
.login-card{position:relative;z-index:2;width:100%;max-width:400px;background:rgba(255,255,255,.06);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:36px 30px;box-shadow:0 30px 70px rgba(0,0,0,.6);animation:popIn .6s cubic-bezier(.16,1,.3,1) both;}
@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(20px);}to{opacity:1;transform:scale(1) translateY(0);}}
.logo-circle{width:72px;height:72px;border-radius:50%;margin:0 auto 16px;background:linear-gradient(135deg,#0EA5E9,#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;box-shadow:0 0 30px rgba(14,165,233,.5);}
.login-title{font-size:19px;font-weight:800;color:#fff;text-align:center;margin-bottom:4px;}
.login-sub{font-size:12px;color:rgba(255,255,255,.45);text-align:center;margin-bottom:28px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11.5px;font-weight:700;color:rgba(255,255,255,.5);margin-bottom:7px;text-transform:uppercase;letter-spacing:.5px;}
.field input{width:100%;padding:13px 16px;border:1.5px solid rgba(255,255,255,.12);border-radius:12px;background:rgba(255,255,255,.06);color:#fff;font-size:15px;font-family:inherit;text-align:center;letter-spacing:1px;transition:all .2s;}
.field input:focus{outline:none;border-color:rgba(14,165,233,.6);background:rgba(14,165,233,.1);}
.field input::placeholder{color:rgba(255,255,255,.25);letter-spacing:normal;}
.login-btn{width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;background:linear-gradient(135deg,#0EA5E9,#8B5CF6);color:#fff;font-size:15px;font-weight:700;font-family:inherit;box-shadow:0 4px 24px rgba(14,165,233,.5);transition:all .2s;margin-top:6px;}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(14,165,233,.6);}
.login-btn:disabled{opacity:.6;cursor:not-allowed;}
.login-error{display:none;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#FCA5A5;font-size:12.5px;padding:11px 14px;border-radius:10px;margin-bottom:16px;text-align:center;}
.login-error.show{display:block;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.login-foot{text-align:center;margin-top:20px;font-size:11px;color:rgba(255,255,255,.25);}
.back-home{position:fixed;top:20px;right:20px;color:rgba(255,255,255,.5);text-decoration:none;font-size:12.5px;font-weight:700;z-index:10;background:rgba(255,255,255,.08);padding:8px 16px;border-radius:20px;}

/* PORTAL */
#portalContent{display:none;min-height:100vh;}
#portalContent.show{display:block;}
.p-header{background:linear-gradient(135deg,#0F172A,#1E1B4B);padding:16px 5%;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
.p-header-left{display:flex;align-items:center;gap:12px;}
.p-logo{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#0EA5E9,#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;}
.p-header-text h1{font-size:15px;font-weight:800;color:#fff;}
.p-header-text p{font-size:10.5px;color:rgba(255,255,255,.4);}
.p-logout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.p-logout:hover{background:rgba(255,255,255,.18);}

/* TABS */
.p-tabs{display:flex;gap:4px;background:#fff;padding:6px;border-radius:14px;margin:16px 5% 0;overflow-x:auto;box-shadow:0 2px 12px rgba(14,165,233,.08);position:sticky;top:74px;z-index:15;}
.p-tab{flex:1;min-width:90px;text-align:center;padding:10px 8px;border-radius:10px;font-size:12px;font-weight:700;color:#94A3B8;cursor:pointer;transition:all .2s;white-space:nowrap;}
.p-tab.active{background:linear-gradient(135deg,#0EA5E9,#8B5CF6);color:#fff;}

.p-body{max-width:680px;margin:0 auto;padding:20px 16px 60px;}
.p-panel{display:none;}
.p-panel.active{display:block;animation:fadeIn .3s;}

.p-card{background:#fff;border-radius:18px;padding:22px;box-shadow:0 4px 24px rgba(14,165,233,.08);margin-bottom:18px;border:1px solid #EFF6FF;}
.p-profile-top{display:flex;align-items:center;gap:16px;margin-bottom:18px;}
.p-avatar{width:62px;height:62px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,#0EA5E9,#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;}
.p-name{font-size:19px;font-weight:800;color:#0F172A;}
.p-mobile{font-size:12.5px;color:#94A3B8;margin-top:2px;}
.p-status-badge{margin-right:auto;padding:7px 18px;border-radius:24px;font-size:12.5px;font-weight:700;white-space:nowrap;}
.p-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.p-info-item{background:#F8FAFF;border-radius:12px;padding:12px 14px;}
.p-info-label{font-size:10.5px;color:#94A3B8;font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
.p-info-value{font-size:14px;font-weight:700;color:#0F172A;}
.p-card-title{font-size:14.5px;font-weight:800;color:#0F172A;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.p-fee-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #F1F5F9;font-size:13.5px;}
.p-fee-row:last-child{border:none;}
.p-fee-row.total{font-weight:800;font-size:15px;color:#0EA5E9;}
.p-docs-table{width:100%;border-collapse:collapse;font-size:13px;}
.p-docs-table th{padding:9px 12px;text-align:right;color:#475569;font-size:11px;background:#F8FAFF;font-weight:700;}
.p-docs-table td{padding:10px 12px;border-top:1px solid #F1F5F9;}
.p-empty{text-align:center;padding:40px 20px;color:#94A3B8;font-size:13px;}
.p-footer{text-align:center;padding:24px 16px;font-size:11.5px;color:#94A3B8;}
.p-footer a{color:#0EA5E9;text-decoration:none;font-weight:700;}

/* MESSAGES */
.msg-box{display:flex;flex-direction:column;gap:10px;max-height:400px;overflow-y:auto;margin-bottom:16px;padding:4px;}
.msg-bubble{max-width:75%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.6;}
.msg-bubble.client{align-self:flex-end;background:linear-gradient(135deg,#0EA5E9,#8B5CF6);color:#fff;border-bottom-left-radius:4px;}
.msg-bubble.admin{align-self:flex-start;background:#F1F5F9;color:#0F172A;border-bottom-right-radius:4px;}
.msg-time{font-size:9.5px;opacity:.7;margin-top:4px;}
.msg-input-row{display:flex;gap:8px;}
.msg-input-row input{flex:1;padding:11px 14px;border:1.5px solid #E2E8F0;border-radius:12px;font-size:13.5px;font-family:inherit;}
.msg-input-row input:focus{outline:none;border-color:#0EA5E9;}
.msg-send-btn{background:linear-gradient(135deg,#0EA5E9,#8B5CF6);color:#fff;border:none;border-radius:12px;padding:0 18px;font-weight:700;cursor:pointer;font-size:14px;}

/* TIMELINE */
.timeline{position:relative;padding-right:26px;}
.timeline::before{content:'';position:absolute;right:9px;top:6px;bottom:6px;width:2px;background:#E2E8F0;}
.tl-item{position:relative;padding-bottom:20px;}
.tl-item::before{content:'';position:absolute;right:-26px;top:2px;width:18px;height:18px;border-radius:50%;background:#0EA5E9;border:3px solid #fff;box-shadow:0 0 0 2px #0EA5E9;}
.tl-item.done::before{background:#10B981;box-shadow:0 0 0 2px #10B981;}
.tl-title{font-size:13.5px;font-weight:700;color:#0F172A;}
.tl-date{font-size:11px;color:#94A3B8;margin-top:2px;}

.wa-float{position:fixed;bottom:24px;left:24px;z-index:50;width:56px;height:56px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;font-size:26px;text-decoration:none;box-shadow:0 6px 24px rgba(37,211,102,.45);animation:waPulse 2.5s ease-in-out infinite;}
@keyframes waPulse{0%,100%{box-shadow:0 6px 24px rgba(37,211,102,.45);}50%{box-shadow:0 6px 36px rgba(37,211,102,.7),0 0 0 10px rgba(37,211,102,.08);}}
.loading-spin{width:36px;height:36px;border:3px solid rgba(14,165,233,.2);border-top-color:#0EA5E9;border-radius:50%;animation:spin .8s linear infinite;margin:60px auto;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

<script>
const SUPABASE_URL = 'https://ixgsartlktmgqfnzzatv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml4Z3NhcnRsa3RtZ3Fmbnp6YXR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NzQwODYsImV4cCI6MjA5ODU1MDA4Nn0.QP6CRf3oGS8cvQMcF8uDU-vZ7YOVfPWUJsjqQ2G6T_8';
const _supa = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const SESSION_KEY = 'mfj_client_session';

const STATUS_LABEL = {pending:'⏳ زیرِ التواء',progress:'🔄 جاری',documents:'📄 دستاویزات درکار',submitted:'📤 جمع شدہ',done:'✅ مکمل',paid:'💰 ادا شدہ'};
const STATUS_COLOR = {pending:'#F59E0B',progress:'#0EA5E9',documents:'#8B5CF6',submitted:'#6366F1',done:'#10B981',paid:'#10B981'};
const CATEGORY_LABEL = {income_tax:'Income Tax Return',ntn:'NTN Registration',sales_tax:'Sales Tax',business_reg:'Business Registration',company_reg:'Company Registration',pvt_ltd:'Pvt Ltd Company',import_export:'Import/Export',other:'دیگر'};

let currentClient = null;

async function doClientLogin(){
  const mobileRaw = document.getElementById('inMobile').value.trim();
  const cnicLast4 = document.getElementById('inCnicLast4').value.trim();
  const errEl = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errEl.classList.remove('show');
  if(!mobileRaw || !cnicLast4){ errEl.textContent='⚠ موبائل نمبر اور CNIC دونوں درج کریں'; errEl.classList.add('show'); return; }
  btn.disabled=true; btn.textContent='⏳ تلاش ہو رہا ہے...';
  const mobile = mobileRaw.replace(/[\s-]/g,'');
  try{
    const {data, error} = await _supa.from('clients').select('*').or(`mobile.eq.${mobile},whatsapp.eq.${mobile}`);
    if(error) throw error;
    if(!data || data.length===0){ errEl.textContent='⚠ یہ موبائل نمبر ریکارڈ میں نہیں ملا'; errEl.classList.add('show'); btn.disabled=false; btn.textContent='🔓 داخل ہوں'; return; }
    const match = data.find(c => (c.cnic||'').replace(/\D/g,'').slice(-4) === cnicLast4);
    if(!match){ errEl.textContent='⚠ CNIC نمبر درست نہیں'; errEl.classList.add('show'); btn.disabled=false; btn.textContent='🔓 داخل ہوں'; return; }
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({id:match.id, ts:Date.now()}));
    currentClient = match;
    showPortal(match);
  } catch(e){
    console.error(e);
    errEl.textContent='⚠ کنکشن میں مسئلہ — دوبارہ کوشش کریں';
    errEl.classList.add('show'); btn.disabled=false; btn.textContent='🔓 داخل ہوں';
  }
}

function clientLogout(){
  sessionStorage.removeItem(SESSION_KEY);
  currentClient = null;
  document.getElementById('portalContent').classList.remove('show');
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('inMobile').value=''; document.getElementById('inCnicLast4').value='';
}

function switchTab(tab){
  document.querySelectorAll('.p-tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===tab));
  document.querySelectorAll('.p-panel').forEach(p=>p.classList.toggle('active', p.id==='panel-'+tab));
  if(tab==='messages') loadMessages();
}

function showPortal(c){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('portalContent').classList.add('show');

  const sLabel = STATUS_LABEL[c.status] || c.status || '—';
  const sColor = STATUS_COLOR[c.status] || '#94A3B8';
  const catLabel = CATEGORY_LABEL[c.category] || c.category || '—';
  const payments = c.payments || [];
  const totalPaid = payments.reduce((s,p)=>s+parseFloat(p.amount||0),0);
  const fee = parseFloat(c.fee||0);
  const remaining = fee - totalPaid;
  const docs = c.docs || {};
  const docEntries = Object.entries(docs);

  const html = `
    <!-- PROFILE TAB -->
    <div class="p-panel active" id="panel-profile">
      <div class="p-card">
        <div class="p-profile-top">
          <div class="p-avatar">${(c.name||'?')[0]}</div>
          <div style="flex:1;"><div class="p-name">${c.name||'—'}</div><div class="p-mobile">${c.mobile||''}</div></div>
          <div class="p-status-badge" style="background:${sColor}1A;border:1.5px solid ${sColor};color:${sColor};">${sLabel}</div>
        </div>
        <div class="p-info-grid">
          <div class="p-info-item"><div class="p-info-label">💼 خدمت</div><div class="p-info-value">${catLabel}</div></div>
          <div class="p-info-item"><div class="p-info-label">🏙️ شہر</div><div class="p-info-value">${c.city||'—'}</div></div>
          <div class="p-info-item"><div class="p-info-label">🪪 CNIC</div><div class="p-info-value" style="font-family:monospace;">${c.cnic||'—'}</div></div>
          ${c.ntn?`<div class="p-info-item"><div class="p-info-label">🏛️ NTN</div><div class="p-info-value" style="font-family:monospace;">${c.ntn}</div></div>`:''}
          ${c.email?`<div class="p-info-item"><div class="p-info-label">📧 Email</div><div class="p-info-value">${c.email}</div></div>`:''}
          <div class="p-info-item"><div class="p-info-label">📅 رجسٹریشن</div><div class="p-info-value">${c.date?c.date.slice(0,10):'—'}</div></div>
        </div>
      </div>
      ${c.followUpDate?`<div class="p-card" style="background:#FFF7ED;border-color:#FED7AA;"><div class="p-card-title" style="color:#EA580C;">🔔 فالو اپ</div><div style="font-size:14px;color:#9A3412;">${c.followUpDate}${c.followUpNote?' — '+c.followUpNote:''}</div></div>`:''}
      ${c.note?`<div class="p-card" style="background:#FFFBEB;border-color:#FDE68A;"><div class="p-card-title" style="color:#92400E;">💬 نوٹ</div><div style="font-size:13.5px;color:#78350F;">${c.note}</div></div>`:''}
    </div>

    <!-- STATUS TAB -->
    <div class="p-panel" id="panel-status">
      <div class="p-card">
        <div class="p-card-title">📊 کیس کی موجودہ حالت</div>
        <div style="text-align:center;padding:20px 0;">
          <div style="font-size:40px;margin-bottom:8px;">${sIcon(c.status)}</div>
          <div style="font-size:20px;font-weight:800;color:${sColor};">${sLabel}</div>
        </div>
      </div>
      <div class="p-card">
        <div class="p-card-title">🕓 پراگریس ٹائم لائن</div>
        <div class="timeline">
          ${buildTimeline(c.status)}
        </div>
      </div>
    </div>

    <!-- DOCS TAB -->
    <div class="p-panel" id="panel-docs">
      ${docEntries.length?`
      <div class="p-card">
        <div class="p-card-title">📄 دستاویزات چیک لسٹ</div>
        <table class="p-docs-table">
          <thead><tr><th>دستاویز</th><th>حالت</th></tr></thead>
          <tbody>${docEntries.map(([d,v])=>`<tr><td>${d}</td><td style="font-weight:700;color:${v?'#10B981':'#EF4444'};">${v?'✅ جمع':'❌ باقی'}</td></tr>`).join('')}</tbody>
        </table>
      </div>`:`<div class="p-card"><div class="p-empty">📭 ابھی کوئی دستاویزات لسٹ موجود نہیں</div></div>`}
      <div class="p-card" style="background:#EFF6FF;border-color:#BAE6FD;">
        <div style="font-size:12.5px;color:#0369A1;text-align:center;">📤 دستاویزات اپلوڈ کرنے کے لیے WhatsApp پر بھیجیں</div>
      </div>
    </div>

    <!-- INVOICE TAB -->
    <div class="p-panel" id="panel-invoice">
      <div class="p-card">
        <div class="p-card-title">💰 فیس کی تفصیل</div>
        <div class="p-fee-row"><span>کل فیس</span><span>Rs ${fee.toLocaleString()}</span></div>
        <div class="p-fee-row"><span>ادا شدہ</span><span style="color:#10B981;font-weight:700;">Rs ${totalPaid.toLocaleString()}</span></div>
        <div class="p-fee-row total"><span>${remaining>0?'باقی رقم':'مکمل ادائیگی ✅'}</span><span>${remaining>0?'Rs '+remaining.toLocaleString():'Rs 0'}</span></div>
        ${payments.length?`<div style="margin-top:14px;padding-top:14px;border-top:1px dashed #E2E8F0;"><div style="font-size:11.5px;font-weight:700;color:#94A3B8;margin-bottom:8px;">ادائیگی تاریخ:</div>${payments.map(p=>`<div style="font-size:12.5px;color:#475569;padding:4px 0;">💵 Rs ${parseFloat(p.amount).toLocaleString()} — ${p.date}${p.note?' ('+p.note+')':''}</div>`).join('')}</div>`:''}
      </div>
      <div class="p-card" style="text-align:center;">
        <button class="login-btn" style="background:linear-gradient(135deg,#25D366,#1EBE57);" onclick="requestInvoiceWA()">📤 رسید WhatsApp پر منگوائیں</button>
      </div>
    </div>

    <!-- MESSAGES TAB -->
    <div class="p-panel" id="panel-messages">
      <div class="p-card">
        <div class="p-card-title">💬 MFJ Services سے پیغام رسانی</div>
        <div class="msg-box" id="msgBox"><div class="p-empty">⏳ پیغامات لوڈ ہو رہے ہیں...</div></div>
        <div class="msg-input-row">
          <input type="text" id="msgInput" placeholder="اپنا پیغام لکھیں..." onkeydown="if(event.key==='Enter')sendClientMsg()">
          <button class="msg-send-btn" onclick="sendClientMsg()">بھیجیں</button>
        </div>
      </div>
    </div>

    <div class="p-footer">
      MFJ Services — Tax & Business Solutions<br>
      <a href="tel:+923469592120">📞 ہم سے رابطہ کریں</a> &nbsp;|&nbsp; <a href="https://wa.me/923469592120">💬 WhatsApp</a>
    </div>
  `;
  document.getElementById('pBody').innerHTML = html;
}

function sIcon(status){
  return {pending:'⏳',progress:'🔄',documents:'📄',submitted:'📤',done:'✅',paid:'💰'}[status] || '📋';
}

function buildTimeline(currentStatus){
  const stages = [
    {key:'pending', label:'درخواست موصول'},
    {key:'documents', label:'دستاویزات اکٹھی'},
    {key:'progress', label:'کام جاری'},
    {key:'submitted', label:'جمع شدہ'},
    {key:'done', label:'مکمل'},
    {key:'paid', label:'ادائیگی مکمل'},
  ];
  const order = ['pending','documents','progress','submitted','done','paid'];
  const currentIdx = order.indexOf(currentStatus);
  return stages.map((s,i)=>{
    const isDone = i <= currentIdx;
    return `<div class="tl-item ${isDone?'done':''}"><div class="tl-title">${s.label}</div></div>`;
  }).join('');
}

function requestInvoiceWA(){
  if(!currentClient) return;
  const msg = `السلام علیکم! مجھے اپنی فائل (${currentClient.name}) کی رسید/انوائس چاہیے۔`;
  window.open('https://wa.me/923469592120?text='+encodeURIComponent(msg),'_blank');
}

/* MESSAGES */
async function loadMessages(){
  if(!currentClient) return;
  const box = document.getElementById('msgBox');
  try{
    const {data, error} = await _supa.from('messages').select('*').eq('client_id', currentClient.id).order('created_at',{ascending:true});
    if(error) throw error;
    if(!data || !data.length){ box.innerHTML='<div class="p-empty">📭 ابھی کوئی پیغام نہیں — پہلا پیغام بھیجیں!</div>'; return; }
    box.innerHTML = data.map(m=>`
      <div class="msg-bubble ${m.sender==='client'?'client':'admin'}">
        ${m.message}
        <div class="msg-time">${new Date(m.created_at).toLocaleString('ur-PK',{hour:'2-digit',minute:'2-digit',day:'numeric',month:'short'})}</div>
      </div>`).join('');
    box.scrollTop = box.scrollHeight;
  } catch(e){
    box.innerHTML = '<div class="p-empty">⚠ پیغامات لوڈ نہیں ہو سکے</div>';
    console.warn(e);
  }
}

async function sendClientMsg(){
  if(!currentClient) return;
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if(!text) return;
  input.value='';
  try{
    const {error} = await _supa.from('messages').insert({client_id:currentClient.id, sender:'client', message:text, is_read:false});
    if(error) throw error;
    loadMessages();
  } catch(e){ console.warn(e); alert('پیغام بھیجنے میں مسئلہ — دوبارہ کوشش کریں'); }
}

async function checkSession(){
  const sess = sessionStorage.getItem(SESSION_KEY);
  if(!sess) return;
  try{
    const {id} = JSON.parse(sess);
    const {data, error} = await _supa.from('clients').select('*').eq('id', id).single();
    if(!error && data){ currentClient = data; showPortal(data); }
  } catch(e){ console.warn(e); }
}

document.addEventListener('DOMContentLoaded', checkSession);
</script>
